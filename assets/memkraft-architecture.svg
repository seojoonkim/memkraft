<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="inputGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a4a"/>
      <stop offset="100%" style="stop-color:#0f2a38"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#153040"/>
      <stop offset="100%" style="stop-color:#0c1f2e"/>
    </linearGradient>
    <linearGradient id="storageGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a4a"/>
      <stop offset="100%" style="stop-color:#0f2a38"/>
    </linearGradient>
    <linearGradient id="moduleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1c4a5a"/>
      <stop offset="100%" style="stop-color:#12323f"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00bcd4"/>
      <stop offset="100%" style="stop-color:#26c6da"/>
    </linearGradient>
    <linearGradient id="dreamGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1a3a"/>
      <stop offset="100%" style="stop-color:#1a0f28"/>
    </linearGradient>
    <marker id="arrowCyan" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00bcd4"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ab47bc"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00bcd4" stroke-width="0.5"/>
    </pattern>
    <rect width="1200" height="900" fill="url(#grid)"/>
  </g>

  <!-- Title -->
  <text x="600" y="52" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="700" fill="#e0f7fa" text-anchor="middle">MemKraft Architecture</text>
  <text x="600" y="76" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#4db6ac" text-anchor="middle" letter-spacing="3">ZERO-DEPENDENCY MEMORY ENGINE</text>
  <line x1="400" y1="88" x2="800" y2="88" stroke="url(#accentGrad)" stroke-width="1" opacity="0.4"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- INPUT LAYER -->
  <!-- ═══════════════════════════════════════════ -->
  <g>
    <!-- Layer container -->
    <rect x="60" y="110" width="1080" height="120" rx="12" fill="url(#inputGrad)" stroke="#00bcd4" stroke-width="1"/>
    <text x="90" y="138" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#00bcd4" letter-spacing="2" font-weight="700">INPUT LAYER</text>
    <line x1="60" y1="148" x2="1140" y2="148" stroke="#00bcd4" stroke-width="0.5" opacity="0.3"/>

    <!-- CLI -->
    <rect x="120" y="163" width="260" height="50" rx="8" fill="url(#moduleGrad)" stroke="#26c6da" stroke-width="0.8"/>
    <text x="155" y="185" font-family="'SF Mono', monospace" font-size="13" fill="#4dd0e1" font-weight="600">⌘</text>
    <text x="175" y="185" font-family="'SF Pro Display', Arial, sans-serif" font-size="14" fill="#e0f7fa" font-weight="700">CLI</text>
    <text x="175" y="202" font-family="'SF Mono', monospace" font-size="10" fill="#4db6ac">memkraft remember / recall</text>

    <!-- Python API -->
    <rect x="420" y="163" width="260" height="50" rx="8" fill="url(#moduleGrad)" stroke="#26c6da" stroke-width="0.8"/>
    <text x="455" y="185" font-family="'SF Mono', monospace" font-size="13" fill="#4dd0e1" font-weight="600">🐍</text>
    <text x="478" y="185" font-family="'SF Pro Display', Arial, sans-serif" font-size="14" fill="#e0f7fa" font-weight="700">Python API</text>
    <text x="478" y="202" font-family="'SF Mono', monospace" font-size="10" fill="#4db6ac">MemKraft() / .remember() .recall()</text>

    <!-- MCP Server -->
    <rect x="720" y="163" width="260" height="50" rx="8" fill="url(#moduleGrad)" stroke="#26c6da" stroke-width="0.8"/>
    <text x="755" y="185" font-family="'SF Mono', monospace" font-size="13" fill="#4dd0e1" font-weight="600">⚡</text>
    <text x="778" y="185" font-family="'SF Pro Display', Arial, sans-serif" font-size="14" fill="#e0f7fa" font-weight="700">MCP Server</text>
    <text x="778" y="202" font-family="'SF Mono', monospace" font-size="10" fill="#4db6ac">stdio / Model Context Protocol</text>
  </g>

  <!-- Arrow: Input → Core -->
  <line x1="600" y1="230" x2="600" y2="270" stroke="#00bcd4" stroke-width="2" marker-end="url(#arrowCyan)"/>
  <line x1="300" y1="230" x2="300" y2="255" stroke="#00bcd4" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="300" y1="255" x2="600" y2="255" stroke="#00bcd4" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="900" y1="230" x2="900" y2="255" stroke="#00bcd4" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="900" y1="255" x2="600" y2="255" stroke="#00bcd4" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- CORE ENGINE -->
  <!-- ═══════════════════════════════════════════ -->
  <g>
    <rect x="60" y="275" width="1080" height="370" rx="12" fill="url(#coreGrad)" stroke="#00acc1" stroke-width="1.2"/>
    <text x="90" y="303" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#00bcd4" letter-spacing="2" font-weight="700">CORE ENGINE</text>
    <line x1="60" y1="313" x2="1140" y2="313" stroke="#00bcd4" stroke-width="0.5" opacity="0.3"/>

    <!-- Row 1: Entity Detection + IDF Search -->
    <!-- Entity Detection -->
    <rect x="90" y="330" width="480" height="80" rx="8" fill="url(#moduleGrad)" stroke="#26c6da" stroke-width="0.8"/>
    <text x="120" y="358" font-family="'SF Pro Display', Arial, sans-serif" font-size="15" fill="#e0f7fa" font-weight="700">Entity Detection</text>
    <g transform="translate(120, 370)">
      <rect x="0" y="0" width="50" height="22" rx="4" fill="#00363a" stroke="#4dd0e1" stroke-width="0.5"/>
      <text x="25" y="15" font-family="'SF Mono', monospace" font-size="10" fill="#4dd0e1" text-anchor="middle">EN</text>
      <rect x="60" y="0" width="50" height="22" rx="4" fill="#00363a" stroke="#4dd0e1" stroke-width="0.5"/>
      <text x="85" y="15" font-family="'SF Mono', monospace" font-size="10" fill="#4dd0e1" text-anchor="middle">KR</text>
      <rect x="120" y="0" width="50" height="22" rx="4" fill="#00363a" stroke="#4dd0e1" stroke-width="0.5"/>
      <text x="145" y="15" font-family="'SF Mono', monospace" font-size="10" fill="#4dd0e1" text-anchor="middle">CN</text>
      <rect x="180" y="0" width="50" height="22" rx="4" fill="#00363a" stroke="#4dd0e1" stroke-width="0.5"/>
      <text x="205" y="15" font-family="'SF Mono', monospace" font-size="10" fill="#4dd0e1" text-anchor="middle">JP</text>
      <text x="260" y="15" font-family="'SF Pro Display', Arial, sans-serif" font-size="11" fill="#4db6ac">person · org · product · location</text>
    </g>

    <!-- IDF Search -->
    <rect x="600" y="330" width="510" height="80" rx="8" fill="url(#moduleGrad)" stroke="#26c6da" stroke-width="0.8"/>
    <text x="630" y="358" font-family="'SF Pro Display', Arial, sans-serif" font-size="15" fill="#e0f7fa" font-weight="700">IDF Search</text>
    <text x="630" y="380" font-family="'SF Pro Display', Arial, sans-serif" font-size="11" fill="#4db6ac">Inverse Document Frequency scoring</text>
    <text x="630" y="398" font-family="'SF Mono', monospace" font-size="10" fill="#26c6da">tf-idf weighted · entity boost · tag matching</text>

    <!-- Row 2: Agentic Search (wide) -->
    <rect x="90" y="425" width="1020" height="85" rx="8" fill="url(#moduleGrad)" stroke="#00e5ff" stroke-width="1"/>
    <text x="120" y="453" font-family="'SF Pro Display', Arial, sans-serif" font-size="15" fill="#e0f7fa" font-weight="700">Agentic Search</text>
    <text x="260" y="453" font-family="'SF Pro Display', Arial, sans-serif" font-size="11" fill="#4db6ac">Multi-hop reasoning pipeline</text>

    <!-- Agentic Search flow -->
    <g transform="translate(120, 468)">
      <rect x="0" y="0" width="140" height="28" rx="6" fill="#0a2a35" stroke="#00e5ff" stroke-width="0.6"/>
      <text x="70" y="18" font-family="'SF Mono', monospace" font-size="11" fill="#00e5ff" text-anchor="middle">decompose</text>

      <line x1="145" y1="14" x2="175" y2="14" stroke="#00e5ff" stroke-width="1.2" marker-end="url(#arrowCyan)"/>

      <rect x="180" y="0" width="140" height="28" rx="6" fill="#0a2a35" stroke="#00e5ff" stroke-width="0.6"/>
      <text x="250" y="18" font-family="'SF Mono', monospace" font-size="11" fill="#00e5ff" text-anchor="middle">traverse</text>

      <line x1="325" y1="14" x2="355" y2="14" stroke="#00e5ff" stroke-width="1.2" marker-end="url(#arrowCyan)"/>

      <rect x="360" y="0" width="140" height="28" rx="6" fill="#0a2a35" stroke="#00e5ff" stroke-width="0.6"/>
      <text x="430" y="18" font-family="'SF Mono', monospace" font-size="11" fill="#00e5ff" text-anchor="middle">re-rank</text>

      <line x1="505" y1="14" x2="535" y2="14" stroke="#00e5ff" stroke-width="1.2" marker-end="url(#arrowCyan)"/>

      <rect x="540" y="0" width="160" height="28" rx="6" fill="#0a2a35" stroke="#00e5ff" stroke-width="0.6"/>
      <text x="620" y="18" font-family="'SF Mono', monospace" font-size="11" fill="#00e5ff" text-anchor="middle">sufficiency check</text>
    </g>

    <!-- Row 3: Dream Cycle + Fact Registry + Auto-Summarize -->
    <!-- Dream Cycle -->
    <rect x="90" y="525" width="320" height="100" rx="8" fill="url(#dreamGrad)" stroke="#ab47bc" stroke-width="0.8"/>
    <text x="120" y="553" font-family="'SF Pro Display', Arial, sans-serif" font-size="15" fill="#ce93d8" font-weight="700">Dream Cycle</text>
    <text x="245" y="553" font-family="'SF Mono', monospace" font-size="9" fill="#ab47bc">⟳ background</text>
    <g transform="translate(120, 565)">
      <rect x="0" y="0" width="75" height="22" rx="4" fill="#1a0a25" stroke="#ab47bc" stroke-width="0.5"/>
      <text x="37" y="15" font-family="'SF Mono', monospace" font-size="10" fill="#ce93d8" text-anchor="middle">decay</text>
      <rect x="85" y="0" width="75" height="22" rx="4" fill="#1a0a25" stroke="#ab47bc" stroke-width="0.5"/>
      <text x="122" y="15" font-family="'SF Mono', monospace" font-size="10" fill="#ce93d8" text-anchor="middle">dedup</text>
      <rect x="170" y="0" width="95" height="22" rx="4" fill="#1a0a25" stroke="#ab47bc" stroke-width="0.5"/>
      <text x="217" y="15" font-family="'SF Mono', monospace" font-size="10" fill="#ce93d8" text-anchor="middle">compress</text>
    </g>
    <text x="120" y="610" font-family="'SF Pro Display', Arial, sans-serif" font-size="10" fill="#7e57c2">strength-based retention · similarity merge</text>

    <!-- Fact Registry -->
    <rect x="430" y="525" width="310" height="100" rx="8" fill="url(#moduleGrad)" stroke="#26c6da" stroke-width="0.8"/>
    <text x="460" y="553" font-family="'SF Pro Display', Arial, sans-serif" font-size="15" fill="#e0f7fa" font-weight="700">Fact Registry</text>
    <text x="460" y="575" font-family="'SF Pro Display', Arial, sans-serif" font-size="11" fill="#4db6ac">Cross-domain entity linking</text>
    <text x="460" y="595" font-family="'SF Mono', monospace" font-size="10" fill="#26c6da">entity → facts[] mapping</text>
    <text x="460" y="612" font-family="'SF Mono', monospace" font-size="10" fill="#26c6da">contradiction detection · merge</text>

    <!-- Auto-Summarize -->
    <rect x="760" y="525" width="350" height="100" rx="8" fill="url(#moduleGrad)" stroke="#26c6da" stroke-width="0.8"/>
    <text x="790" y="553" font-family="'SF Pro Display', Arial, sans-serif" font-size="15" fill="#e0f7fa" font-weight="700">Auto-Summarize</text>
    <text x="790" y="575" font-family="'SF Pro Display', Arial, sans-serif" font-size="11" fill="#4db6ac">Automatic content compression</text>
    <text x="790" y="595" font-family="'SF Mono', monospace" font-size="10" fill="#26c6da">long-form → key facts extraction</text>
    <text x="790" y="612" font-family="'SF Mono', monospace" font-size="10" fill="#26c6da">preserves entities · tags · links</text>
  </g>

  <!-- Arrow: Core → Storage -->
  <line x1="600" y1="645" x2="600" y2="685" stroke="#00bcd4" stroke-width="2" marker-end="url(#arrowCyan)"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- STORAGE LAYER -->
  <!-- ═══════════════════════════════════════════ -->
  <g>
    <rect x="60" y="690" width="1080" height="110" rx="12" fill="url(#storageGrad)" stroke="#00bcd4" stroke-width="1"/>
    <text x="90" y="718" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#00bcd4" letter-spacing="2" font-weight="700">STORAGE LAYER</text>
    <line x1="60" y1="728" x2="1140" y2="728" stroke="#00bcd4" stroke-width="0.5" opacity="0.3"/>

    <!-- Markdown Files -->
    <rect x="120" y="743" width="400" height="42" rx="8" fill="url(#moduleGrad)" stroke="#26c6da" stroke-width="0.8"/>
    <text x="155" y="769" font-family="'SF Pro Display', Arial, sans-serif" font-size="14" fill="#e0f7fa" font-weight="700">📄  Markdown Files</text>
    <text x="310" y="769" font-family="'SF Mono', monospace" font-size="11" fill="#4db6ac">YAML frontmatter + body</text>

    <!-- Properties -->
    <rect x="560" y="743" width="190" height="42" rx="8" fill="#0a2a35" stroke="#26c6da" stroke-width="0.5"/>
    <text x="655" y="769" font-family="'SF Mono', monospace" font-size="11" fill="#4dd0e1" text-anchor="middle">zero-dependency</text>

    <rect x="770" y="743" width="160" height="42" rx="8" fill="#0a2a35" stroke="#26c6da" stroke-width="0.5"/>
    <text x="850" y="769" font-family="'SF Mono', monospace" font-size="11" fill="#4dd0e1" text-anchor="middle">git-friendly</text>

    <rect x="950" y="743" width="160" height="42" rx="8" fill="#0a2a35" stroke="#26c6da" stroke-width="0.5"/>
    <text x="1030" y="769" font-family="'SF Mono', monospace" font-size="11" fill="#4dd0e1" text-anchor="middle">human-readable</text>
  </g>

  <!-- ═══════════════════════════════════════════ -->
  <!-- Dream Cycle Loopback Arrow -->
  <!-- ═══════════════════════════════════════════ -->
  <path d="M 200 625 L 200 660 Q 200 680 180 680 L 40 680 Q 20 680 20 700 L 20 760 Q 20 780 40 780 L 55 780"
        fill="none" stroke="#ab47bc" stroke-width="1.8" stroke-dasharray="6,4" marker-end="url(#arrowPurple)" opacity="0.7"/>
  <text x="22" y="730" font-family="'SF Mono', monospace" font-size="9" fill="#ab47bc" transform="rotate(-90, 22, 730)">dream loopback</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- Data Flow Labels -->
  <!-- ═══════════════════════════════════════════ -->
  <text x="620" y="258" font-family="'SF Mono', monospace" font-size="9" fill="#4db6ac">data flow ▼</text>
  <text x="620" y="675" font-family="'SF Mono', monospace" font-size="9" fill="#4db6ac">persist ▼</text>

  <!-- Footer -->
  <line x1="200" y1="840" x2="1000" y2="840" stroke="#00bcd4" stroke-width="0.5" opacity="0.2"/>
  <text x="600" y="862" font-family="'SF Pro Display', Arial, sans-serif" font-size="11" fill="#37474f" text-anchor="middle">MemKraft — Pure Python Memory Engine · No embeddings · No vector DB · No external dependencies</text>
  <text x="600" y="880" font-family="'SF Mono', monospace" font-size="9" fill="#263238" text-anchor="middle">github.com/memkraft</text>
</svg>